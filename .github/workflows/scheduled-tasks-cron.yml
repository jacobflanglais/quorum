name: Scheduled tasks cron

on:
  # Every 5 minutes. GitHub Actions cron can occasionally be delayed
  # under load — for time-sensitive scheduling this is "best effort",
  # not "exactly on schedule". Vercel Cron daily noon UTC is the safety
  # net so tasks at least fire once per day even if Actions stalls.
  schedule:
    - cron: "*/5 * * * *"
  # Manual trigger from the Actions tab — useful for testing.
  workflow_dispatch:

# Only one run at a time. If a previous run is still in flight, the
# new one waits or is skipped (cancel-in-progress: false keeps the
# in-flight one going).
concurrency:
  group: scheduled-tasks-cron
  cancel-in-progress: false

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Ping cron endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set on this repository."
            exit 1
          fi

          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://quorum-rouge.vercel.app/api/cron/scheduled-tasks")

          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP $status"
          echo "$body"

          if [ "$status" != "200" ]; then
            echo "::error::Cron endpoint returned non-200"
            exit 1
          fi
